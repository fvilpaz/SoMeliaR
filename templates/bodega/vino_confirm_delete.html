{% extends 'base.html' %}
{% block title %}Eliminar vino{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger border-0 shadow-sm">
            <div class="card-header bg-danger text-white">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>Eliminar vino de la carta
            </div>
            <div class="card-body">
                <p class="mb-1">¿Eliminar <strong>{{ vino }}</strong> de la carta?</p>
                <p class="text-muted small">El historial de movimientos y pedidos se conserva. Puedes reactivarlo desde el panel de admin.</p>
                <div class="d-flex gap-2 mt-4">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash3-fill me-1"></i>Sí, eliminar
                        </button>
                    </form>
                    <a href="{% url 'bodega:vino_detail' vino.pk %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
