{% extends 'base.html' %}
{% block title %}Movimiento Rápido{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-5">

    <h2 class="mb-4"><i class="bi bi-lightning-charge-fill text-warning"></i> Movimiento Rápido</h2>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post" id="form-rapido" autocomplete="off">
          {% csrf_token %}

          <!-- Buscador de vino -->
          <div class="mb-3">
            <label class="form-label fw-semibold">Vino</label>
            <input type="text" id="buscador-vino" class="form-control form-control-lg"
                   placeholder="Escribe el nombre del vino..."
                   list="lista-vinos" required>
            <datalist id="lista-vinos">
              {% for v in vinos %}
              <option value="{{ v.nombre }}" data-id="{{ v.pk }}">{{ v.get_familia_display }}</option>
              {% endfor %}
            </datalist>
            <input type="hidden" name="vino_id" id="vino-id-hidden">
            <div id="vino-info" class="mt-1 small text-muted d-none"></div>
          </div>

          <!-- Tipo -->
          <div class="mb-3">
            <label class="form-label fw-semibold">Tipo</label>
            <div class="d-flex gap-2">
              <input type="radio" class="btn-check" name="tipo" id="tipo-salida" value="salida" checked>
              <label class="btn btn-outline-danger flex-fill" for="tipo-salida">
                <i class="bi bi-dash-circle"></i> Venta / Salida
              </label>

              <input type="radio" class="btn-check" name="tipo" id="tipo-entrada" value="entrada">
              <label class="btn btn-outline-success flex-fill" for="tipo-entrada">
                <i class="bi bi-plus-circle"></i> Entrada
              </label>

              <input type="radio" class="btn-check" name="tipo" id="tipo-ajuste" value="ajuste">
              <label class="btn btn-outline-secondary flex-fill" for="tipo-ajuste">
                <i class="bi bi-pencil"></i> Ajuste
              </label>
            </div>
          </div>

          <!-- Cantidad -->
          <div class="mb-4">
            <label class="form-label fw-semibold">Cantidad</label>
            <input type="number" name="cantidad" id="cantidad" class="form-control form-control-lg"
                   value="1" min="0.5" step="0.5" required>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100" id="btn-registrar">
            <i class="bi bi-check-circle"></i> Registrar
          </button>
        </form>
      </div>
    </div>

    <!-- Últimos movimientos de esta sesión -->
    <div id="historial-session" class="mt-4"></div>

  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Mapa nombre → id de todos los vinos
const vinosMap = {
  {% for v in vinos %}"{{ v.nombre|escapejs }}": {{ v.pk }},{% endfor %}
};

const buscador = document.getElementById('buscador-vino');
const hiddenId  = document.getElementById('vino-id-hidden');
const vinoInfo  = document.getElementById('vino-info');
const historial = document.getElementById('historial-session');

buscador.addEventListener('input', function () {
  const id = vinosMap[this.value];
  if (id) {
    hiddenId.value = id;
    vinoInfo.textContent = '✓ Vino encontrado';
    vinoInfo.className = 'mt-1 small text-success';
  } else {
    hiddenId.value = '';
    vinoInfo.textContent = this.value.length > 2 ? 'No encontrado en la lista' : '';
    vinoInfo.className = 'mt-1 small text-danger';
  }
});

// Mostrar mensajes de éxito en el historial inline también
{% if messages %}
{% for message in messages %}
const entry = document.createElement('div');
entry.className = 'alert alert-success alert-dismissible fade show';
entry.innerHTML = `{{ message|escapejs }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
historial.prepend(entry);
{% endfor %}
{% endif %}

// Bloquear submit si no hay vino seleccionado
document.getElementById('form-rapido').addEventListener('submit', function (e) {
  if (!hiddenId.value) {
    e.preventDefault();
    buscador.classList.add('is-invalid');
    buscador.focus();
  }
});
buscador.addEventListener('input', function () {
  buscador.classList.remove('is-invalid');
});
</script>
{% endblock %}
