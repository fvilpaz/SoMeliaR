{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — SoMeliaR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 1.25rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .login-logo {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 12%;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .login-title {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.85rem;
        }

        .form-label {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            border-radius: 0.6rem;
            padding: 0.6rem 0.9rem;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
            box-shadow: 0 0 0 3px rgba(99, 179, 237, 0.25);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 0.6rem;
            padding: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-msg {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.4);
            border-radius: 0.6rem;
            color: #ff8080;
            font-size: 0.85rem;
            padding: 0.6rem 0.9rem;
        }
        .divider { border-color: rgba(255,255,255,0.15); }
        .link-muted { color: rgba(255,255,255,0.5); font-size: 0.875rem; text-decoration: none; }
        .link-muted:hover { color: #fff; }
        .link-accent { color: #a78bfa; font-size: 0.875rem; }
        .link-accent:hover { color: #c4b5fd; }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <img src="{% static 'img/logo_login_cayetano.jpeg' %}" alt="SoMeliaR" class="login-logo mb-3">
            <div class="login-title">SoMeliaR</div>
            <div class="login-subtitle">Gestión de Bodega · Meliá Hotels</div>
        </div>

        {% if form.errors %}
        <div class="error-msg mb-3">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>
            Usuario o contraseña incorrectos. Inténtalo de nuevo.
        </div>
        {% endif %}

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label">
                    <i class="bi bi-person-fill me-1"></i>Usuario
                </label>
                <input type="text" name="username" id="id_username" class="form-control" placeholder="Tu usuario"
                    maxlength="150" autocomplete="username" autofocus required>
            </div>
            <div class="mb-4">
                <label for="id_password" class="form-label">
                    <i class="bi bi-lock-fill me-1"></i>Contraseña
                </label>
                <input type="password" name="password" id="id_password" class="form-control" placeholder="Tu contraseña"
                    autocomplete="current-password" required>
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn btn-login btn-primary w-100 text-white">
                <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
            </button>
        </form>

        <hr class="divider mt-4">
        <div class="text-center">
            <span class="link-muted">¿No tienes cuenta?</span>
            <a href="{% url 'core:registro' %}" class="link-accent ms-1">Crear cuenta nueva</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
