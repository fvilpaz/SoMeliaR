<div class="p-3 bg-light rounded border">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <div class="d-flex align-items-center gap-2">
            <div class="spinner-border spinner-border-sm text-dark" role="status"></div>
            <strong>Escaneando… <span class="counter-txt">{{ state.progreso }}/{{ state.total }}</span></strong>
        </div>
        <small class="text-muted found-txt">{{ state.ok }} fotos encontradas</small>
    </div>
    <div class="progress mb-2" style="height:6px;">
        <div class="progress-bar bg-dark" style="width:{% if state.total %}{% widthratio state.progreso state.total 100 %}{% else %}0{% endif %}%"></div>
    </div>
    {% if state.procesando %}
    <div class="text-muted small mb-2 procesando-txt">Procesando: <em>{{ state.procesando }}</em></div>
    {% endif %}
    <div class="scan-log" style="max-height:140px;overflow-y:auto;font-size:.78rem;">
        {% for entrada in state.log %}
        <div class="{% if entrada|slice:':1' == '✓' %}text-success{% else %}text-muted{% endif %}">{{ entrada }}</div>
        {% endfor %}
    </div>
</div>
